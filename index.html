<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Captain's Log</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap"
      rel="stylesheet"
    />

    <style>
      @font-face {
        font-family: "Harrington";
        src:
          url("Harrington.woff") format("woff"),
          url("Harrington.ttf") format("truetype");
      }
      body {
        background: #6b4f2a;
        color: #2b2118;
        font-family: Harrington;
        margin: 0;
        padding: 40px 20px;
        line-height: 1.8;
      }

      .container {
        background-image: url("11468999.png");
        background-repeat: no-repeat;
        background-position: center top;
        background-size: contain;

        width: 800px;
        min-height: 1100px;

        margin: 0 auto;
        padding: 120px 100px 120px 100px;

        box-sizing: border-box;
      }
      .container {
        box-shadow: none;
      }

      .container-content {
        width: 70%;
        margin: 0 auto;
      }

      h1 {
        font-family: "Harrington";
        text-align: center;
        font-size: 3rem;
        margin-bottom: 20px;
      }

      p {
        max-width: 600px;
        margin: 0 auto;
        text-indent: 30px;
      }

      .signature {
        margin-top: 30px;
        text-align: right;
        font-family: Harrington;
      }

      .clue-image {
        text-align: center;
        margin: 30px 0;
      }

      .clue-image img {
        width: 400px;
        max-width: 80%;
        height: auto;

        border: 3px solid rgba(80, 50, 20, 0.4);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Kan ni smaka guldet?</h1>

      <p>För fan Carla, hur svårt ska det vara att skriva in en URL?!</p>

      <div class="clue-image">
        <img src="el_kanoto.PNG" />
      </div>

      <p class="signature">— El capitan</p>
    </div>
  </body>
</html>
